<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESK | Automatizado</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3;
            --border: #d2d2d7;
            --highlight: #f0f0f2;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; }

        .navbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 15px 5%;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.2rem; }
        .logo span { color: var(--accent); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 5%; }
        
        .hero { text-align: center; margin-bottom: 60px; }
        .hero h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 30px;
            display: flex; flex-direction: column; border: 1px solid transparent;
            transition: all 0.4s ease;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }

        .img-container { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .specs-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .spec-tag { background: var(--highlight); padding: 8px; border-radius: 8px; font-size: 0.7rem; }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-size: 1.5rem; font-weight: 800; }

        .btn-buy {
            background: var(--accent); color: white; padding: 10px 20px;
            border-radius: 10px; text-decoration: none; font-weight: 600;
        }

        .ia-badge {
            background: #fdf2f2; color: #c81e1e; padding: 4px 8px;
            border-radius: 5px; font-size: 0.6rem; font-weight: 800; margin-bottom: 10px; display: inline-block;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">DESK<span>.</span>CORE</div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Hardware Inteligente.</h1>
            <p>Datos sincronizados desde la nube.</p>
        </header>
        <section class="grid" id="productGrid"></section>
    </main>

    <script>
        // ==========================================
        // 1. PEGA TU LINK DE GOOGLE SHEETS AQUÍ ABAJO:
        // ==========================================
   // 1. LINK DE TU HOJA (Ya configurado como CSV)
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSBF7zpi6LpVYz_xFfZSXDTYS3RBs4O1ZCZawUzoP61nsoo5u6F0meZk39-B3V9_3Pm4GkPgwq_iClG/pub?gid=1932716565&single=true&output=csv';

async function cargarDesdeSheets() {
    const grid = document.getElementById('productGrid');
    try {
        // Pedimos el CSV directamente a Google
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error('Error al conectar');
        
        const csv = await res.text();
        
        const filas = csv.trim().split(/\r?\n/).slice(1); 
        const productos = filas.map(f => {
            const c = f.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
            const d = c.map(v => v.replace(/^"|"$/g, "").trim());
            if (d.length < 3) return null;

            return {
                nombre: d[0], tienda: d[1], precio: d[2], link: d[3],
                imagen: d[4], veredicto: d[5], spec1: d[6] || "", spec2: d[7] || ""
            };
        }).filter(p => p !== null);

        renderizar(productos);
    } catch (e) {
        grid.innerHTML = "<p>Error de conexión: Verifica que el link de Sheets esté Publicado en la Web como CSV.</p>";
    }
}

function renderizar(lista) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = lista.map(p => `
        <div class="card">
            <div style="font-size:0.7rem; color:var(--accent); font-weight:700; text-transform:uppercase;">${p.tienda}</div>
            <div class="img-container"><img src="${p.imagen}" onerror="this.src='https://via.placeholder.com/200?text=Sin+Imagen'"></div>
            <div class="ia-badge">${p.veredicto}</div>
            <h3 style="margin:0; font-size:1.2rem;">${p.nombre}</h3>
            <div class="specs-preview">
                ${p.spec1 ? `<div class="spec-tag">${p.spec1}</div>` : ''}
                ${p.spec2 ? `<div class="spec-tag">${p.spec2}</div>` : ''}
                ${p.spec3 ? `<div class="spec-tag">${p.spec3}</div>` : ''}
                ${p.spec4 ? `<div class="spec-tag">${p.spec4}</div>` : ''}
            </div>
            <div class="price-row">
                <span class="price">$${p.precio} <small style="font-size:0.7rem;">MXN</small></span>
                <a href="${p.link}" target="_blank" class="btn-buy">Ver Oferta</a>
            </div>
        </div>
    `).join('');
}

cargarDesdeSheets();
    </script>
</body>
</html>
